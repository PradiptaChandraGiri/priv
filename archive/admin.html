<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{
      "colors":{"tertiary-fixed-dim":"#ffb783","on-secondary-container":"#c4abff","on-surface":"#e4e1ed","error-container":"#93000a","surface-bright":"#393841","on-primary":"#1000a9","on-surface-variant":"#c7c4d7","surface-variant":"#34343d","on-background":"#e4e1ed","inverse-primary":"#494bd6","tertiary-fixed":"#ffdcc5","background":"#13131b","error":"#ffb4ab","primary-container":"#8083ff","on-secondary-fixed-variant":"#5516be","primary-fixed-dim":"#c0c1ff","on-secondary-fixed":"#23005c","tertiary-container":"#d97721","surface-container":"#1f1f27","surface-container-highest":"#34343d","primary-fixed":"#e1e0ff","surface-dim":"#13131b","surface-container-low":"#1b1b23","outline-variant":"#464554","inverse-on-surface":"#303038","primary":"#c0c1ff","secondary-fixed-dim":"#d0bcff","on-tertiary-container":"#452000","surface":"#13131b","inverse-surface":"#e4e1ed","on-tertiary-fixed-variant":"#703700","outline":"#908fa0","on-primary-container":"#0d0096","on-primary-fixed-variant":"#2f2ebe","surface-container-high":"#292932","on-error-container":"#ffdad6","surface-container-lowest":"#0d0d15","on-primary-fixed":"#07006c","on-secondary":"#3c0091","on-tertiary-fixed":"#301400","secondary-container":"#571bc1","secondary":"#d0bcff","surface-tint":"#c0c1ff","on-tertiary":"#4f2500","tertiary":"#ffb783","on-error":"#690005","secondary-fixed":"#e9ddff"},
      "borderRadius":{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
      "spacing":{"gutter":"24px","unit-xs":"4px","unit-xl":"48px","margin-mobile":"20px","unit-sm":"8px","container-max":"1280px","unit-lg":"24px","unit-md":"16px","margin-desktop":"64px"},
      "fontFamily":{"display-lg":["Poppins"],"display-lg-mobile":["Poppins"],"body-md":["Inter"],"code-block":["JetBrains Mono"],"body-lg":["Inter"],"headline-md":["Poppins"],"label-caps":["Inter"]},
      "fontSize":{"display-lg":["48px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"700"}],"display-lg-mobile":["32px",{"lineHeight":"1.2","fontWeight":"700"}],"body-md":["16px",{"lineHeight":"1.5","fontWeight":"400"}],"code-block":["14px",{"lineHeight":"1.7","fontWeight":"400"}],"body-lg":["18px",{"lineHeight":"1.6","fontWeight":"400"}],"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"label-caps":["12px",{"lineHeight":"1.0","letterSpacing":"0.05em","fontWeight":"600"}]}
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .material-symbols-outlined.fill-icon { font-variation-settings:'FILL' 1; }

  @keyframes pulse-glow { 0%,100%{opacity:.1;transform:scale(1);} 50%{opacity:.2;transform:scale(1.05);} }
  .ambient-glow { animation: pulse-glow 8s infinite ease-in-out; }

  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  .shake { animation: shake 0.45s ease; }

  @keyframes spin { to { transform:rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display:inline-block; }

  /* Page loader */
  #page-loader{position:fixed;inset:0;z-index:9999;background:#0b0f1a;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s ease;}
  #page-loader.done{opacity:0;pointer-events:none;}
  #page-loader .ring{width:44px;height:44px;border:3px solid rgba(192,193,255,0.15);border-top-color:#c0c1ff;border-radius:50%;animation:spin 0.8s linear infinite;}
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden antialiased">

<!-- Ambient Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/20 rounded-full blur-[120px] ambient-glow pointer-events-none z-0"></div>
<div class="absolute top-1/4 right-1/4 w-[400px] h-[400px] bg-secondary/10 rounded-full blur-[100px] ambient-glow pointer-events-none z-0" style="animation-delay:3s"></div>

<!-- Login Container -->
<main class="w-full max-w-md px-margin-mobile z-10">
  <div class="bg-surface/40 backdrop-blur-xl border border-white/10 rounded-xl shadow-[0_0_40px_rgba(192,193,255,0.08)] relative overflow-hidden">
    <!-- Top highlight -->
    <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>

    <div class="p-unit-lg md:p-unit-xl">
      <!-- Header -->
      <div class="flex flex-col items-center text-center mb-unit-lg">
        <a href="index.html" class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center mb-unit-sm border border-outline-variant/30 shadow-inner hover:border-primary/50 transition-colors">
          <span class="material-symbols-outlined fill-icon text-primary text-[32px]">admin_panel_settings</span>
        </a>
        <h1 class="font-headline-md text-headline-md text-on-surface mb-unit-xs">SYSTEM_ADMIN</h1>
        <p class="font-code-block text-code-block text-on-surface-variant/80">Authenticate to access command center.</p>
      </div>

      <!-- FIX #6: Form now submits to backend API — no hardcoded credentials -->
      <form class="space-y-unit-md" id="adminLoginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="space-y-unit-xs">
          <label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block ml-1" for="email">Admin ID / Email</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">badge</span>
            <input class="w-full bg-surface-container-low text-on-surface border border-outline-variant/50 rounded-xl py-3 pl-12 pr-4 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner"
                   id="email" placeholder="your@email.com" required type="email" autocomplete="email"/>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-unit-xs">
          <label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block ml-1" for="password">Passcode</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">key</span>
            <input class="w-full bg-surface-container-low text-on-surface border border-outline-variant/50 rounded-xl py-3 pl-12 pr-12 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner"
                   id="password" placeholder="••••••••••••" required type="password" autocomplete="current-password"/>
            <!-- Toggle password visibility -->
            <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[20px]" id="pwd-eye">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error message area -->
        <div id="login-error" class="hidden rounded-lg bg-error-container/20 border border-error/30 px-4 py-3 font-code-block text-code-block text-error/80"></div>

        <!-- Submit button -->
        <div class="pt-unit-sm">
          <button
            class="w-full bg-primary text-on-primary font-label-caps text-label-caps uppercase rounded-xl py-4 px-6 flex items-center justify-center gap-2 hover:bg-primary-fixed-dim hover:shadow-[0_0_30px_rgba(192,193,255,0.3)] transition-all duration-300 relative overflow-hidden group disabled:opacity-60 disabled:cursor-not-allowed"
            id="loginBtn" type="submit">
            <div class="absolute inset-0 bg-gradient-to-r from-transparent to-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            <span class="relative z-10" id="btnText">Initialize Session</span>
            <span class="material-symbols-outlined text-[18px] relative z-10 transition-transform group-hover:translate-x-1" id="btnIcon">login</span>
          </button>
        </div>
      </form>

      <!-- Footer -->
      <div class="mt-unit-lg text-center font-code-block text-[10px] text-outline-variant/60 flex items-center justify-center gap-2">
        <span class="w-2 h-2 rounded-full bg-[#10b981] inline-block animate-pulse"></span>
        SECURE CONNECTION · BACKEND AUTHENTICATED
      </div>

      <div class="mt-3 text-center">
        <a href="index.html" class="font-label-caps text-[10px] text-outline-variant/50 hover:text-primary transition-colors uppercase tracking-wider">← Back to Portfolio</a>
      </div>
    </div>
  </div>
</main>

<!-- Toast container -->
<div id="login-toast" class="fixed bottom-6 right-6 z-50 hidden"></div>

<script>
/* ─── CONFIGURATION ──────────────────────────────────────────
   FIX #6: Set your Railway backend URL here.
   After deploying to Railway, replace the URL below.
   Leave as localhost for local testing.
──────────────────────────────────────────────────────────── */
const BACKEND_URL = 'http://localhost:5000/api'; /* ← change to Railway URL after deploy */
/* e.g.: const BACKEND_URL = 'https://portfolio-backend-xxxx.up.railway.app/api'; */

/* ── Dark mode ── */
(function(){ const s=localStorage.getItem('theme'); document.documentElement.classList.toggle('dark',s!=='light'); })();

/* ── Page loader ── */
document.addEventListener('DOMContentLoaded', () => {
  let loader = document.getElementById('page-loader');
  if (!loader) {
    loader = document.createElement('div');
    loader.id = 'page-loader';
    loader.innerHTML = '<div class="ring"></div>';
    document.body.prepend(loader);
  }
  window.addEventListener('load', () => {
    setTimeout(() => loader && loader.classList.add('done'), 400);
    setTimeout(() => loader && loader.remove(), 950);
  });

  /* If already logged in with a valid token, skip to dashboard */
  const token = localStorage.getItem('admin_token');
  if (token) {
    /* Verify token is still valid before redirecting */
    fetch(BACKEND_URL + '/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(res => {
      if (res.ok) window.location.replace('dashboard.html');
      else localStorage.removeItem('admin_token'); /* expired token */
    }).catch(() => {}); /* offline — stay on login page */
  }
});

/* ── Password visibility toggle ── */
function togglePasswordVisibility() {
  const pwd = document.getElementById('password');
  const eye = document.getElementById('pwd-eye');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    eye.textContent = 'visibility_off';
  } else {
    pwd.type = 'password';
    eye.textContent = 'visibility';
  }
}

/* ── FIX #6: Secure login via backend API ── */
async function handleLogin(event) {
  event.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const btnText  = document.getElementById('btnText');
  const btnIcon  = document.getElementById('btnIcon');
  const errDiv   = document.getElementById('login-error');
  const card     = btn.closest('.rounded-xl');

  /* Clear previous error */
  errDiv.classList.add('hidden');
  errDiv.textContent = '';

  /* Loading state */
  btn.disabled = true;
  btnText.textContent = 'AUTHENTICATING...';
  btnIcon.classList.add('spin');

  try {
    const res  = await fetch(BACKEND_URL + '/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (res.ok && data.token) {
      /* ✅ SUCCESS */
      localStorage.setItem('admin_token', data.token);
      localStorage.setItem('admin_name',  data.name || 'Admin');

      btnText.textContent = 'ACCESS GRANTED ✓';
      btnIcon.classList.remove('spin');
      btnIcon.textContent = 'check_circle';
      btn.style.background = 'linear-gradient(90deg, #10b981, #059669)';
      btn.style.boxShadow  = '0 0 20px rgba(16,185,129,0.4)';

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);

    } else {
      throw new Error(data.error || 'Invalid credentials. Access denied.');
    }

  } catch (err) {
    /* ❌ FAIL */
    btn.disabled = false;
    btnText.textContent = 'Initialize Session';
    btnIcon.classList.remove('spin');
    btnIcon.textContent = 'login';
    btn.style.background = '';
    btn.style.boxShadow  = '';

    /* Show error in card */
    errDiv.textContent = '⚠️ ' + err.message;
    errDiv.classList.remove('hidden');

    /* Shake the card */
    if (card) {
      card.classList.add('shake');
      card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    }

    /* Flash inputs red */
    ['email', 'password'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.style.borderColor = '#ef4444';
        el.style.boxShadow   = '0 0 0 2px rgba(239,68,68,0.25)';
        setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1400);
      }
    });

    /* Toast notification */
    showToast(err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('login-toast');
  if (!t) return;
  t.innerHTML = `<div class="bg-surface-container border border-error/40 text-error/90 px-5 py-3 rounded-xl font-code-block text-[12px] shadow-lg flex items-center gap-2">
    <span class="material-symbols-outlined text-[16px]">error</span>${msg}
  </div>`;
  t.classList.remove('hidden');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hidden'), 4000);
}

/* Clear error on typing */
['email','password'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => {
    document.getElementById('login-error').classList.add('hidden');
  });
});
</script>

</body></html>
