<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom glow animation for the background ambient light */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.05); }
        }
        .ambient-glow {
            animation: pulse-glow 8s infinite ease-in-out;
        }

        /* Loading spinner animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden antialiased">
<!-- Ambient Background Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/20 rounded-full blur-[120px] ambient-glow pointer-events-none z-0"></div>
<!-- Login Container -->
<main class="w-full max-w-md px-margin-mobile z-10">
<!-- Glassmorphic Card -->
<div class="bg-surface/40 backdrop-blur-xl border border-white/10 rounded-xl shadow-[0_0_40px_rgba(192,193,255,0.08)] relative overflow-hidden">
<!-- Inner light border top highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<div class="p-unit-lg md:p-unit-xl">
<!-- Header -->
<div class="flex flex-col items-center text-center mb-unit-lg">
<a href="index.html" class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center mb-unit-sm border border-outline-variant/30 shadow-inner hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined fill-icon text-primary text-[32px]">admin_panel_settings</span>
</a>
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit-xs">SYSTEM_ADMIN</h1>
<p class="font-code-block text-code-block text-on-surface-variant/80">Authenticate to access command center.</p>
</div>
<!-- Form -->
<form class="space-y-unit-md" id="adminLoginForm" onsubmit="handleLogin(event)">
<!-- Email Field -->
<div class="space-y-unit-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block ml-1" for="email">Admin ID / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">badge</span>
<input class="w-full bg-surface-container-low text-on-surface border border-outline-variant/50 rounded-xl py-3 pl-12 pr-4 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="email" placeholder="admin@system.local" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block ml-1" for="password">Passcode</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">key</span>
<input class="w-full bg-surface-container-low text-on-surface border border-outline-variant/50 rounded-xl py-3 pl-12 pr-4 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="password" placeholder="••••••••••••" required="" type="password">
</div>
</div>
<!-- Actions -->
<div class="pt-unit-sm">
<a href="dashboard.html" class="w-full bg-primary text-on-primary font-label-caps text-label-caps uppercase rounded-xl py-4 px-6 flex items-center justify-center gap-2 hover:bg-primary-fixed-dim hover:shadow-[0_0_30px_rgba(192,193,255,0.3)] transition-all duration-300 relative overflow-hidden group" id="loginBtn">
<!-- Subtle violet gradient overlay per spec -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent to-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="relative z-10" id="btnText">Initialize Session</span>
<span class="material-symbols-outlined text-[18px] relative z-10 transition-transform group-hover:translate-x-1" id="btnIcon">login</span>
</a>
</div>
</form>
<!-- Terminal style footer -->
<div class="mt-unit-lg text-center font-code-block text-[10px] text-outline-variant/60 flex items-center justify-center gap-2">
<span class="w-2 h-2 rounded-full bg-error-container inline-block animate-pulse"></span>
                    SECURE CONNECTION VERIFIED
                </div>
</div>
</div>
</main>
<script>
        function handleLogin(event) {
            event.preventDefault(); // Prevent actual submission
            
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');
            
            // Set loading state
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = "AUTHENTICATING...";
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            // Simulate network request
            setTimeout(() => {
                // Reset state (simulating failed/successful redirect in reality)
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.textContent = "Initialize Session";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                
                // Optional: Add a brief success flash effect
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    input.classList.add('border-primary');
                    setTimeout(() => input.classList.remove('border-primary'), 300);
                });

            }, 2000);
        }
    </script>


</body></html>
